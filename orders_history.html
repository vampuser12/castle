  <script>
    "use strict";

    // get page and limit number from href attribute
    let parameters = window.location.href.split("?")[1];
    let page = 0;
    let limit = 10;

    let count = 0;

    try{
      page = parseInt(parameters.split("&")[0].split("=")[1]) -1 ;
    }
    catch(err){
      page = 0;
    }
    try{
      limit = parseInt(parameters.split("&")[1].split("=")[1]);
    }
    catch(err){
      limit = 10;
    }
    
    if(limit!=10){
      document.getElementById("inputGroupSelect01").value = limit;
    }
    


    // const categoryIDs={
    //     "Special Pizza": 1,

    function searchOrder(){
      var searchValue = document.getElementById("search-input").value;
        var table = document.getElementById("table-orders");
        var rowCount = table.rows.length;
        for (var i = 0; i < rowCount; i++) {
            var row = table.rows[i];
            var text = row.innerText;
            if (text.toLowerCase().indexOf(searchValue.toLowerCase()) > -1) {
                row.style.display = "";
            } else {
                row.style.display = "none";
            }
        }
    }
    function myScript() {
      //fetch login status
      fetch("https://black-cottage.herokuapp.com/api/loginstatus", {
        headers: {
          //token
          Authorization: "Bearer " + localStorage.getItem("token"),
        },
      }).then(
        function (response) {
          // response.json().then(res=>console.log(res));
          // console.log();

          if (response.status !== 200) {
            console.log(response);
            //readable stream to text
            response.text().then((res) => {
              console.log(res);
            });
            // response.body.getReader().read().then(res=>console.log(res));
            // response.json().then(res => {
            //   console.log(res);
            // });
            return;
          } //go to orders.html
          else {
            response.text().then((res) => {
              console.log(res);
            });
            //get orders
            fetch("https://black-cottage.herokuapp.com/api/orders/page/"+page+'/'+limit, {
              headers: {
                Authorization: "Bearer " + localStorage.getItem("token"),
              },
            })
              .then(function (response) {
                console.log(response);
                if (response.status !== 200) {
                  response.text().then((res) => console.log(res));
                  return;
                }
                return response.json();
              })
              .then(function (data) {
                console.log(data);
                let data_table = '';
                //show orders
                var orders = document.getElementsByClassName("orders")[0];
                var listdata = "";
                for (var i = 0; i < data.length; i++) {
                  var order = data[i];
                  console.log(order);

                  //get order status
                  let status = "Pending";
                  if (order.Cancelled) {
                    status = "Cancelled";
                  } else if (order.OrderDelivered) status = "Delivered";
                  else if (order.RiderHandOver) status = "On The Way";
                  else if (order.OrderReceived) status = "Preparing";

                  data_table += `<tr>
                            <th class="scope="row">${order.ID}</th>
                            <td>${
                              //format date and time
                              order.Created.split("T")[0]+
                              " " + order.Created.split("T")[1].split(".")[0]

                            }</td>
                            <td>${order.CustomerPhone}</td>
                            <td>${order.CustomerName}</td>
                            <td>${order.DeliveryAddress}</td>
                            <td>${order.DiscountedAmount}</td>
                            <td id="status-${order.ID}">${status=='Cancelled'? "Cancelled":
                              status=='Delivered' ? 'Delivered':
                              `<select class="${
                              status == "Delivered" ? "bg-success" :
                              status == "Cancelled" ? "bg-danger" :
                              status == "On The Way" ? "bg-warning" :
                              status == "Preparing" ? "bg-primary" :
                              status == "Pending" ? "bg-secondary" :
                              "bg-dark"

                            } text-white fw-bold p-1 rounded" id="status${
                  order.ID
                }" onchange="changeOrderStatus(${order.ID})">
                  <option ${
                    status == "Pending" ? "selected" : ""
                  } value="Pending">Pending</option>
                  <option ${
                    status == "Preparing" ? "selected" : ""
                  } value="Preparing">Preparing</option>
                  <option ${
                    status == "On The Way" ? "selected" : ""
                  } value="On The Way">On The Way</option>
                  <option ${
                    status == "Delivered" ? "selected" : ""
                  } value="Delivered">Delivered</option>
                  <option ${
                    status == "Cancelled" ? "selected" : ""
                  } value="Cancelled">Cancelled</option>
                  </select>`
                            }</td>
                            <td>

                                <a class="btn btn-primary w-100" href="receipt.html#${order.RefID}" target="_blank">${order.RefID}</a>
                            </td>
                        </tr>`;
                  // data_array.push(order.ID, order.CustomerPhone,
                  //  order.CustomerName, order.OrderDate,
                  //  status, order.TotalPrice, order.DeliveryAddress);

                  listdata += `<div class="col-lg-4 order-${
                    order.ID
                  }"><div class="m-2 card ${
                    status == "Delivered"
                      ? "border-success"
                      : status == "On The Way"
                      ? "border-warning"
                      : status == "Preparing"
                      ? "border-primary"
                      : status == "Cancelled"
                      ? "border-danger"
                      : "border-none"
                  }">
              <div class="card-header d-flex">
                Order-
                <strong class="">${order.ID}</strong>
                <span class="ms-auto"> <strong>Status: </strong><select id="status${
                  order.ID
                }" onchange="changeOrderStatus(${order.ID})">
                  <option ${
                    status == "Pending" ? "selected" : ""
                  } value="Pending">Pending</option>
                  <option ${
                    status == "Preparing" ? "selected" : ""
                  } value="Preparing">Preparing</option>
                  <option ${
                    status == "On The Way" ? "selected" : ""
                  } value="On The Way">On The Way</option>
                  <option ${
                    status == "Delivered" ? "selected" : ""
                  } value="Delivered">Delivered</option>
                  <option ${
                    status == "Cancelled" ? "selected" : ""
                  } value="Cancelled">Cancelled</option>
                  </select></span>
              </div>
              <div class="card-body">
                <div class="">
                  <div>
                    <strong>${order.CustomerName}</strong>
                  </div>
                  <div>${order.DeliveryAddress}</div>
                  <div>${order.Note}</div>
                  <!-- <div>Email: info@webz.com.pl</div> -->
                  <div>${order.CustomerPhone}</div>
                </div><div class="table-responsive-sm">
                  <table class="table table-striped">
                    <thead>
                      <tr>
                        <th>Item</th>
                        <th>Options</th>

                        <th class="right">Unit Cost</th>
                        <th class="center">Qty</th>
                        <th class="right">Total</th>
                      </tr>
                    </thead><tbody>`;
                  //iterate through order items
                  for (var j = 0; j < order.Items.length; j++) {
                    var item = order.Items[j];
                    const itemPrice =
                      item.Price +
                      item.Choices.reduce(function (acc, cur) {
                        return acc + cur.OptionPrice;
                      }, 0);
                    listdata += `
                      <tr>
                        <td class="left strong">${item.Name}</td>
                        <td class="left">${item.Choices.reduce(
                          //get OptionNames
                          function (acc, cur) {
                            return acc + cur.OptionName + ", ";
                          },
                          ""
                        )}</td>

                        <td class="right">${
                          //get price
                          itemPrice
                        }</td>
                        <td class="center">${item.Quantity}</td>
                        <td class="right">${
                          //total price
                          itemPrice * item.Quantity
                        }</td>
                      </tr>`;
                  }

                  listdata += `
                    </tbody>
                  </table>
                </div>
                <div class="row">
                  <div class="col-lg-4 col-sm-5"></div>

                  <div class="col-lg-4 col-sm-5 ml-auto">
                    <table class="table table-clear">
                      <tbody>
                        <tr>
                          <td class="left">
                            <strong>Subtotal</strong>
                          </td>
                          <td class="right">${
                            order.DiscountedAmount + " PKR"
                          }</td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
            </div>`;
                  // var orderDiv = document.createElement("div");
                  // orderDiv.className = "order";
                  // //show order in bootstrap card
                  // var card = document.createElement("div");
                  // card.className = "card";
                  // var cardBody = document.createElement("div");
                  // cardBody.className = "card-body";
                  // card.appendChild(cardBody);
                  // var cardTitle = document.createElement("h5");
                  // cardTitle.className = "card-title";
                  // cardTitle.innerHTML = order.ID;
                  // cardBody.appendChild(cardTitle);
                  // var cardText = document.createElement("p");
                  // cardText.className = "card-text";
                  // cardText.innerHTML = order.CustomerName;
                  // cardBody.appendChild(cardText);
                  // var cardText2 = document.createElement("p");
                  // cardText2.className = "card-text";
                  // cardText2.innerHTML = order.CustomerPhones;
                  // cardBody.appendChild(cardText2);

                  // orders.appendChild(card);
                }
                // orders.innerHTML = listdata;
                document.getElementById("table-orders").innerHTML = data_table;
              });
          }
        }

        // Examine the text in the response
      );

      loadCartItems();
    }
    function changeOrderStatus(orderID) {
      var status = document.getElementById("status" + orderID).value;
      console.log(orderID, status);

      fetch(
        "https://black-cottage.herokuapp.com/api/orders/ChangeOrderStatus",
        {
          method: "POST",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8",
            Authorization: localStorage.getItem("token"),
          },
          body: `OrderID=${orderID}&Status=${
            //encoded
            encodeURIComponent(status)
          }`,
        }
      ).then(function (response) {
        if (response.status !== 200) {
          response.text().then(function (text) {
            console.log(text);
          });
        } else {
          //change order status in table
          var status_DOM = document.getElementById("status-" + orderID);
          status_DOM.innerHTML = `${status=='Cancelled'? "Cancelled":
                              status=='Delivered' ? 'Delivered':
                              `<select class="${
                              status == "Delivered" ? "bg-success" :
                              status == "Cancelled" ? "bg-danger" :
                              status == "On The Way" ? "bg-warning" :
                              status == "Preparing" ? "bg-primary" :
                              status == "Pending" ? "bg-secondary" :
                              "bg-dark"

                            }  text-white fw-bold p-1 rounded" id="status${
                  orderID
                }" onchange="changeOrderStatus(${orderID})">
                  <option ${
                    status == "Pending" ? "selected" : ""
                  } value="Pending">Pending</option>
                  <option ${
                    status == "Preparing" ? "selected" : ""
                  } value="Preparing">Preparing</option>
                  <option ${
                    status == "On The Way" ? "selected" : ""
                  } value="On The Way">On The Way</option>
                  <option ${
                    status == "Delivered" ? "selected" : ""
                  } value="Delivered">Delivered</option>
                  <option ${
                    status == "Cancelled" ? "selected" : ""
                  } value="Cancelled">Cancelled</option>
                  </select>`
                            }`;
          
        }

        // return response.json();
      });
    
    }
    function showOrder(orderID){
      //open recept page on new tab 

      window.open("receipt.html#"+orderID);


    }
    fetch(
      servers.api + '/orders/OrdersCount',
      {
        headers: {
          //token
          Authorization: "Bearer " + localStorage.getItem("token"),
        },
      }
    ).then(function (response) {
      if (response.status !== 200) {
        response.text().then(function (text) {
          console.log(text);
        });
      } else {
        response.json().then(function (data) {
          //set page numbers 
          count = data.count;
          var pages = Math.ceil(data.count / limit);
          var page_numbers = "";
          for (var i = 1; i <= pages; i++) {
            page_numbers += `<li class="page-item ${i-1==page? "active" : ""}"><a class="page-link" href="#" onclick="changePage(${i})">${i}</a></li>`;
          }
          document.getElementById("page-numbers").innerHTML = page_numbers;

          console.log(data);

          // document.getElementById("orders-count").innerHTML = data;
          
        });
      }
    });

    //keep fetching order count after 30 seconds
    setInterval(function () {
      fetch(
        servers.api + '/orders/OrdersCount',
        {
          headers: {
            //token
            Authorization: "Bearer " + localStorage.getItem("token"),
          },
        }
      ).then(function (response) {
        if (response.status !== 200) {
          response.text().then(function (text) {
            console.log(text);
          });
        } else {
          response.json().then(function (data) {
            console.log(data);
            if(count!=0 && count != data.count)
            //show new order button
            document.getElementById("new-order-btn").style.display = "block";
            
            // document.getElementById("orders-count").innerHTML = data;
            
          });
        }
      });
    }, 30000);

    function changeLimit(limit){
      //change limit parameter in url
      var url = new URL(window.location.href);
      url.searchParams.set("page", 1);
      url.searchParams.set("limit", limit);
      window.location.href = url;      
    }

    function changePage(page){
      //change page parameter in url
      var url = new URL(window.location.href);
      url.searchParams.set("page", page);
      url.searchParams.set("limit", limit);
      window.location.href = url;
    }
  </script>
